<svg>
  <g transform="translate(10)"/>
  <!--          ^^^^^^^^^ function.builtin -->
  <g transform="scale(2)"/>
  <!--          ^^^^^ function.builtin -->
  <g transform="rotate(45)"/>
  <!--          ^^^^^^ function.builtin -->
  <g transform="skewX(10)"/>
