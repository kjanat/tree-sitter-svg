name: Regex Harness

on:
  push:
    branches:
      - main
    paths:
      - "tree-sitter.json"
      - "test/regex_samples/**"
      - ".github/workflows/regex-harness.yml"
      - "package.json"
      - "bun.lock"
  pull_request:
    paths:
      - "tree-sitter.json"
      - "test/regex_samples/**"
      - ".github/workflows/regex-harness.yml"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

jobs:
  regex-harness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run regex harness
        run: bun test:regex
