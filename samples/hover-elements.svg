<!-- Hover each element name to see description + baseline + MDN link -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
	<!-- Hover "defs": container for reusable definitions -->
	<defs>
		<!-- Hover "linearGradient": defines a linear color gradient -->
		<linearGradient id="sunset" x1="0%" y1="0%" x2="100%" y2="100%">
			<!-- Hover "stop": defines a gradient color stop -->
			<stop offset="0%" stop-color="#ff6b35" />
			<stop offset="100%" stop-color="#f7c59f" />
		</linearGradient>

		<!-- Hover "clipPath": defines a clipping region -->
		<clipPath id="circle-clip">
			<circle cx="200" cy="150" r="120" />
		</clipPath>

		<!-- Hover "filter": container for filter effect primitives -->
		<filter id="blur">
			<!-- Hover "feGaussianBlur": applies a Gaussian blur -->
			<feGaussianBlur in="SourceGraphic" stdDeviation="3" />
		</filter>

		<!-- Hover "pattern": defines a repeating pattern -->
		<pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
			<circle cx="10" cy="10" r="2" fill="#666" />
		</pattern>

		<!-- Hover "symbol": defines a reusable graphic template -->
		<symbol id="arrow" viewBox="0 0 24 24">
			<path d="M5 12h14M12 5l7 7-7 7" />
		</symbol>
	</defs>

	<!-- Hover "g": groups child elements with shared attributes -->
	<g clip-path="url(#circle-clip)" filter="url(#blur)">
		<!-- Hover "rect": draws a rectangle -->
		<rect x="0" y="0" width="400" height="300" fill="url(#sunset)" />
	</g>

	<!-- Hover "circle": draws a circle -->
	<circle cx="100" cy="80" r="40" fill="#264653" opacity="0.8" />

	<!-- Hover "ellipse": draws an ellipse -->
	<ellipse cx="300" cy="200" rx="60" ry="30" fill="#2a9d8f" />

	<!-- Hover "line": draws a straight line -->
	<line x1="50" y1="250" x2="350" y2="250" stroke="#e76f51" stroke-width="2" />

	<!-- Hover "polygon": draws a closed shape from coordinate pairs -->
	<polygon points="200,20 230,80 170,80" fill="#e9c46a" />

	<!-- Hover "polyline": draws connected line segments (not auto-closed) -->
	<polyline points="50,200 100,180 150,220 200,170" fill="none" stroke="#264653" stroke-width="2" />

	<!-- Hover "path": the most flexible SVG shape element -->
	<path d="M300,100 Q350,50 350,100 T400,100" fill="none" stroke="#e76f51" stroke-width="3" />

	<!-- Hover "use": references and renders another element -->
	<use x="20" y="20" width="24" height="24" href="#arrow" />

	<!-- Hover "image": embeds an external image resource -->
	<image
		x="340"
		y="10"
		width="50"
		height="50"
		href="https://raw.githubusercontent.com/kjanat/svg-language-server/master/samples/assets/hover-image-badge.svg" />

	<!-- Hover "foreignObject": embeds non-SVG content (usually HTML) -->
	<foreignObject x="10" y="260" width="200" height="30">
		<p xmlns="http://www.w3.org/1999/xhtml" style="font-size: 12px">
			HTML inside SVG
		</p>
		<div style="color: red">not SVG</div>
	</foreignObject>
</svg>
