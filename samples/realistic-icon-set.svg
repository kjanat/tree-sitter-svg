<!-- Icon set using symbol + use — tests hover on symbol, use, and path -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
	<defs>
		<symbol id="icon-home" viewBox="0 0 24 24">
			<path
				d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0v-6a1 1 0 011-1h2a1 1 0 011 1v6m-6 0h6"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round" />
		</symbol>

		<symbol id="icon-search" viewBox="0 0 24 24">
			<circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2" />
			<line
				x1="21"
				y1="21"
				x2="16.65"
				y2="16.65"
				stroke="currentColor"
				stroke-width="2"
				stroke-linecap="round" />
		</symbol>

		<symbol id="icon-settings" viewBox="0 0 24 24">
			<path d="M12 15a3 3 0 100-6 3 3 0 000 6z" fill="none" stroke="currentColor" stroke-width="2" />
			<path
				d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
				fill="none"
				stroke="currentColor"
				stroke-width="2" />
		</symbol>

		<symbol id="icon-bell" viewBox="0 0 24 24">
			<path
				d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round" />
		</symbol>
	</defs>

	<!-- Render icons using <use> — hover to see "use" element docs -->
	<use x="20" y="30" width="48" height="48" href="#icon-home" fill="none" stroke="#264653" />
	<use x="100" y="30" width="48" height="48" href="#icon-search" fill="none" stroke="#2a9d8f" />
	<use x="180" y="30" width="48" height="48" href="#icon-settings" fill="none" stroke="#e9c46a" />
	<use x="260" y="30" width="48" height="48" href="#icon-bell" fill="none" stroke="#e76f51" />

	<!-- Labels -->
	<text x="44" y="100" fill="#666" font-family="system-ui" font-size="11" text-anchor="middle">
		Home
	</text>
	<text x="124" y="100" fill="#666" font-family="system-ui" font-size="11" text-anchor="middle">
		Search
	</text>
	<text x="204" y="100" fill="#666" font-family="system-ui" font-size="11" text-anchor="middle">
		Settings
	</text>
	<text x="284" y="100" fill="#666" font-family="system-ui" font-size="11" text-anchor="middle">
		Alerts
	</text>
</svg>
