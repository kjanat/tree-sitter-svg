<!-- Each section below triggers a specific diagnostic -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
	<!-- DIAGNOSTIC: InvalidChild — rect is void, cannot have children -->
	<rect x="10" y="10" width="100" height="50">
		<circle cx="50" cy="25" r="10" />
	</rect>

	<!-- DIAGNOSTIC: InvalidChild — text inside tspan (wrong nesting direction) -->
	<tspan>
		<text x="30" y="100">
			This is backwards
		</text>
	</tspan>

	<!-- DIAGNOSTIC: UnknownElement — not a real SVG element -->
	<banana x="10" y="120" width="50" height="50" />

	<!-- DIAGNOSTIC: UnknownElement — common HTML typo in SVG -->
	<div style="color: red">
		not SVG
	</div>

	<!-- DIAGNOSTIC: DuplicateId — same id used twice -->
	<rect id="box" x="10" y="150" width="40" height="40" fill="red" />
	<rect id="box" x="60" y="150" width="40" height="40" fill="blue" />

	<!-- DIAGNOSTIC: InvalidChild — filter can only contain filter primitives -->
	<filter id="bad-filter">
		<rect x="0" y="0" width="10" height="10" />
	</filter>

	<!-- DIAGNOSTIC: DuplicateId, InvalidChild — suppressed, but first occurence is recognized as unused -->
	<!--svg-lint-disable-next-line UnusedSuppression -->
	<!-- svg-lint-disable-next-line DuplicateId, InvalidChild -->
	<filter id="bad-filter">
		<!-- svg-lint-disable-next-line InvalidChild -->
		<rect x="0" y="0" width="10" height="10" />
	</filter>

	<!-- NO DIAGNOSTIC — this is valid SVG -->
	<g>
		<rect x="10" y="200" width="80" height="40" fill="#2a9d8f" />
		<circle cx="150" cy="220" r="20" fill="#e76f51" />
		<text x="200" y="225" font-size="14">
			Valid text
		</text>
	</g>

	<!-- NO DIAGNOSTIC — valid gradient structure -->
	<defs>
		<linearGradient id="grad1">
			<stop offset="0%" stop-color="white" />
			<stop offset="100%" stop-color="black" />
		</linearGradient>
	</defs>

	<!-- NO DIAGNOSTIC — valid text nesting -->
	<text x="10" y="270" font-size="12">
		<tspan font-weight="bold">
			Bold
		</tspan>
		<tspan>
			and
		</tspan>
		<tspan font-style="italic">
			italic
		</tspan>
	</text>
</svg>

<!-- svg-lint-disable-next-line UnusedSuppression -->

